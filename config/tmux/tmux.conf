# Window/pane index starts at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on


# True color support for Ghostty
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'none'
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Prefix: Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# Large scrollback for verbose Claude output
set -g history-limit 50000

# Visual feedback
set -g display-time 1000
set -g status on
set -g status-position top
set -g status-left ""
set -g status-right '#{?client_prefix,#[bg=colour1 fg=colour255 bold] PREFIX #[default] ,}#[fg=#{@thm_crust},bg=#{@thm_teal}] session: #S '
set -g status-right-length 100

# Window names: show directory basename only
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}#{?#{==:#{pane_current_command},zsh},, (#{s/^[0-9][.0-9]*$/claude/:pane_current_command})}'
set -g allow-rename off

# Window status: active = peach, inactive = subtle gray
set -g window-status-current-format '#[fg=#{@thm_crust},bg=#{@thm_peach},bold] #I: #W#{?@claude_done, #[fg=#{@thm_green}]●#[fg=#{@thm_crust}],} '
set -g window-status-format '#[fg=#{@thm_text},bg=#{@thm_surface0}] #I: #W#{?@claude_done, #[fg=#{@thm_green}]●,} '

# Reload config
bind r source-file ~/.tmux.conf \; display-message "config reloaded"

# New window + splits open in current path
bind c new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind e split-window -h -l 30% -c "#{pane_current_path}"

# Auto-resize active pane to 75% when switching panes
set-hook -g after-select-pane 'if-shell "[ #{window_panes} -eq 2 ]" "if-shell \"[ #{pane_index} -eq 1 ]\" \"resize-pane -x 70%\" \"resize-pane -x 55%\""'

# Sessionizer
bind f display-popup -E "tmux-sessionizer"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @tmux-which-key-xdg-open 0
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-hook-post-save 'tmux display-message "  session saved"'
set -g @resurrect-hook-post-restore 'tmux display-message "  session restored"'

# Clear claude-done indicator on window/session switch
set-hook -g after-select-window 'set-option -wu @claude_done'
set-hook -g client-session-changed 'set-option -wu @claude_done'

# Choose-tree with @claude_done indicator
bind s choose-tree -Zs -F '#{?pane_format,#[fg=#{@thm_subtext0}] #{pane_current_command} "#{pane_title}",#{?window_format,#[fg=#{@thm_peach}]#{?@is_claude_running,#{pane_title}, #{window_name}}#[fg=#{@thm_overlay0}]#{window_flags}#{?@claude_done, #[fg=#{@thm_green}]●,}#[fg=#{@thm_subtext1}] (#{window_panes} panes),#[fg=#{@thm_teal}] #{session_windows} windows#{?session_grouped, #[fg=#{@thm_overlay0}](group #{session_group}: #{session_group_list}),}#{?session_attached, #[fg=#{@thm_green}] (attached),}}}'
bind w choose-tree -Zw -F '#{?pane_format,#[fg=#{@thm_subtext0}] #{pane_current_command} "#{pane_title}",#{?window_format,#[fg=#{@thm_peach}]#{?@is_claude_running,#{pane_title}, #{window_name}}#[fg=#{@thm_overlay0}]#{window_flags}#{?@claude_done, #[fg=#{@thm_green}]●,}#[fg=#{@thm_subtext1}] (#{window_panes} panes),#[fg=#{@thm_teal}] #{session_windows} windows#{?session_grouped, #[fg=#{@thm_overlay0}](group #{session_group}: #{session_group_list}),}#{?session_attached, #[fg=#{@thm_green}] (attached),}}}'

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

run '~/.tmux/plugins/tpm/tpm'

# Mode & message styling (choose-tree, copy-mode, command prompt)
# Must be after catppuccin and tpm to avoid being overridden
set -g mode-style 'bg=#6c7086 bold'
set -g message-style 'fg=#11111b bg=#94e2d5'
set -g message-command-style 'fg=#11111b bg=#94e2d5'
